
<h2 class="sr-only">BlueJeans by Verizon — overlapping orbit diagram representing the intersection of communication, learning, and enterprise-scale design systems</h2>
<style>
.bj-wrap { display:flex; justify-content:center; padding:2rem 0; }
@keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes spin-rev  { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
@keyframes ring-glow { 0%,100%{opacity:.15} 50%{opacity:.28} }
@keyframes dot-travel { 0%,100%{opacity:.2} 50%{opacity:1} }
.r-spin  { animation: spin-slow 28s linear infinite; transform-origin:240px 220px; }
.r-spin2 { animation: spin-rev  20s linear infinite; transform-origin:440px 220px; }
.rg1 { animation: ring-glow 3.5s ease-in-out infinite; }
.rg2 { animation: ring-glow 3.5s ease-in-out infinite 1.2s; }
.rg3 { animation: ring-glow 3.5s ease-in-out infinite 2.4s; }
.dt  { animation: dot-travel 4s ease-in-out infinite; }
.dt:nth-child(2){animation-delay:1s}
.dt:nth-child(3){animation-delay:2s}
.dt:nth-child(4){animation-delay:3s}
</style>
